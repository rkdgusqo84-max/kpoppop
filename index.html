<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f7" />
  <title>운동 기록</title>
  <style>
    :root{
      --bg:#f5f5f7;
      --card:rgba(255,255,255,.86);
      --text:#111114;
      --muted:#74747a;
      --line:#e7e7eb;
      --run:#ff6b2c;
      --strength:#3478f6;
      --green:#30b66b;
      --danger:#ff3b30;
      --shadow:0 12px 30px rgba(0,0,0,.07);
      --radius:24px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Noto Sans KR",sans-serif;
      background:
        radial-gradient(circle at top right, rgba(52,120,246,.12), transparent 34%),
        radial-gradient(circle at top left, rgba(255,107,44,.12), transparent 28%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      -webkit-font-smoothing:antialiased;
    }
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .app{
      width:min(100%,480px);
      margin:0 auto;
      min-height:100vh;
      padding:20px 16px 112px;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:8px 4px 18px;
    }
    .eyebrow{font-size:13px;color:var(--muted);font-weight:700;letter-spacing:.02em}
    h1{margin:2px 0 0;font-size:31px;line-height:1.05;letter-spacing:-.04em}
    .date-pill{
      border:0;background:rgba(255,255,255,.7);backdrop-filter:blur(18px);
      padding:10px 13px;border-radius:16px;color:var(--muted);font-weight:700;
      box-shadow:0 5px 16px rgba(0,0,0,.05);
    }
    .segmented{
      display:grid;grid-template-columns:1fr 1fr;
      background:#e9e9ee;border-radius:16px;padding:4px;margin-bottom:16px;
    }
    .segmented button{
      border:0;background:transparent;padding:10px;border-radius:12px;
      color:var(--muted);font-weight:800;
    }
    .segmented button.active{
      background:#fff;color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.08);
    }
    .hero{
      background:linear-gradient(145deg,#16161a,#2b2b32);
      color:#fff;border-radius:28px;padding:22px;margin-bottom:16px;box-shadow:var(--shadow);
      position:relative;overflow:hidden;
    }
    .hero:after{
      content:"";position:absolute;width:180px;height:180px;border-radius:50%;
      right:-70px;top:-70px;background:linear-gradient(135deg,rgba(255,107,44,.65),rgba(52,120,246,.35));
      filter:blur(4px);
    }
    .hero-top{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:center}
    .hero-label{font-size:14px;color:rgba(255,255,255,.65);font-weight:700}
    .hero-number{position:relative;z-index:1;font-size:44px;font-weight:900;letter-spacing:-.05em;margin-top:8px}
    .hero-number span{font-size:18px;font-weight:700;color:rgba(255,255,255,.65);margin-left:4px}
    .hero-sub{position:relative;z-index:1;margin-top:14px;color:rgba(255,255,255,.66);font-size:13px}
    .hero-score{position:relative;z-index:1;margin-top:18px;display:flex;align-items:flex-end;gap:6px}
    .hero-score strong{font-size:58px;line-height:.9;font-weight:900;letter-spacing:-.065em}
    .hero-score span{font-size:18px;font-weight:800;color:rgba(255,255,255,.64);padding-bottom:6px}
    .hero-total-progress{position:relative;z-index:1;margin-top:20px}
    .hero-progress-track{height:12px;background:rgba(255,255,255,.14);border-radius:999px;overflow:hidden}
    .hero-progress-fill{height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,#ff375f,#ff9f0a);transition:.3s ease}
    .hero-goal-list{position:relative;z-index:1;margin-top:22px;border-top:1px solid rgba(255,255,255,.13)}
    .hero-goal-row{display:flex;justify-content:space-between;align-items:center;padding:15px 0;border-bottom:1px solid rgba(255,255,255,.13)}
    .hero-goal-row:last-child{border-bottom:0;padding-bottom:2px}
    .hero-goal-name{font-size:15px;font-weight:800}
    .hero-goal-value{font-size:16px;font-weight:900}
    .hero-goal-value small{font-size:12px;color:rgba(255,255,255,.56);font-weight:800}
    .card{
      background:var(--card);border:1px solid rgba(255,255,255,.82);border-radius:var(--radius);
      padding:18px;box-shadow:var(--shadow);backdrop-filter:blur(18px);
    }
    .icon.run{background:rgba(255,107,44,.12)}
    .icon.strength{background:rgba(52,120,246,.12)}
    .goal-title{font-weight:900;margin-bottom:12px}
    .goal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .goal-mini{background:#f6f6f9;border-radius:16px;padding:14px}
    .goal-mini span{display:block;font-size:12px;color:var(--muted);font-weight:800;margin-bottom:4px}
    .goal-mini strong{font-size:17px}
    .section-title{display:flex;justify-content:space-between;align-items:center;margin:22px 4px 10px}
    .section-title h2{margin:0;font-size:20px;letter-spacing:-.03em}
    .section-title span{font-size:13px;color:var(--muted)}
    .week-bars{height:150px;display:flex;align-items:end;justify-content:space-between;gap:10px;padding-top:10px}
    .bar-col{flex:1;text-align:center}
    .bar{
      width:100%;min-height:4px;border-radius:999px 999px 8px 8px;
      background:linear-gradient(180deg,var(--run),#ff9a64);
      transition:.25s ease;
    }
    .bar-label{margin-top:8px;font-size:11px;color:var(--muted);font-weight:700}
    .empty{text-align:center;padding:34px 16px;color:var(--muted)}
    .empty strong{display:block;color:var(--text);font-size:17px;margin-bottom:5px}
    .page{display:none}
    .page.active{display:block}
    .type-switch{
      display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;
    }
    .type-switch button{
      border:0;border-radius:18px;padding:16px;font-weight:900;background:#fff;color:var(--muted);
      box-shadow:var(--shadow);
    }
    .type-switch button.active.run{background:var(--run);color:#fff}
    .type-switch button.active.strength{background:var(--strength);color:#fff}
    .form-card{padding:20px}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:13px;color:var(--muted);font-weight:800;margin:0 0 8px 4px}
    .field input,.field select,.field textarea{
      width:100%;border:1px solid var(--line);background:#fafafd;border-radius:16px;
      padding:15px 16px;color:var(--text);outline:none;
    }
    .field textarea{resize:vertical;min-height:84px}
    .field input:focus,.field select:focus,.field textarea:focus{
      border-color:#a9c6ff;box-shadow:0 0 0 4px rgba(52,120,246,.09)
    }
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .primary{
      width:100%;border:0;border-radius:18px;padding:16px 18px;color:#fff;font-weight:900;
      background:linear-gradient(135deg,#111114,#34343a);box-shadow:0 10px 22px rgba(0,0,0,.13);
    }
    .history-card{display:flex;gap:14px;align-items:flex-start;margin-bottom:10px}
    .history-icon{width:46px;height:46px;flex:0 0 46px;border-radius:16px;display:grid;place-items:center;font-size:21px}
    .history-content{flex:1;min-width:0}
    .history-title{font-weight:900}
    .history-meta{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.45}
    .history-note{font-size:13px;margin-top:7px;color:#47474d}
    .delete{
      border:0;background:#f0f0f3;color:var(--danger);width:32px;height:32px;border-radius:12px;font-weight:900
    }
    .bottom-nav{
      position:fixed;left:50%;bottom:14px;transform:translateX(-50%);
      width:min(calc(100% - 24px),456px);display:grid;grid-template-columns:1fr 1fr 1fr 1fr;
      background:rgba(255,255,255,.83);backdrop-filter:blur(24px);
      border:1px solid rgba(255,255,255,.85);border-radius:24px;padding:7px;
      box-shadow:0 15px 40px rgba(0,0,0,.15);z-index:20;
    }
    .nav-btn{
      border:0;background:transparent;border-radius:17px;padding:10px 4px;color:var(--muted);
      display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;font-weight:800;
    }
    .nav-btn .nav-icon{font-size:20px}
    .nav-btn.active{background:#151519;color:#fff}
    .toast{
      position:fixed;left:50%;bottom:104px;transform:translate(-50%,20px);
      background:#151519;color:#fff;padding:12px 16px;border-radius:14px;font-size:14px;font-weight:800;
      opacity:0;pointer-events:none;transition:.25s;z-index:30;
    }
    .toast.show{opacity:1;transform:translate(-50%,0)}
    @media (max-width:370px){
      .two-col{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <div class="eyebrow">TRAINING LOG</div>
        <h1>운동 기록</h1>
      </div>
      <button class="date-pill" id="todayLabel"></button>
    </header>

    <section id="dashboard" class="page active">
      <div class="segmented">
        <button class="period-btn active" data-period="week">이번 주</button>
        <button class="period-btn" data-period="month">이번 달</button>
      </div>

      <div class="hero">
        <div class="hero-top">
          <div class="hero-label" id="heroLabel">이번 주 운동</div>
          <div>🔥</div>
        </div>

        <div class="hero-score">
          <strong id="heroGoalPercent">0</strong><span>%</span>
        </div>

        <div class="hero-total-progress">
          <div class="hero-progress-track">
            <div class="hero-progress-fill" id="heroGoalBar"></div>
          </div>
        </div>

        <div class="hero-goal-list">
          <div class="hero-goal-row">
            <div class="hero-goal-name">🏃 러닝</div>
            <div class="hero-goal-value">
              <span id="runDistance">0.0</span>
              <small> / <span id="heroRunGoal">0</span> km</small>
            </div>
          </div>
          <div class="hero-goal-row">
            <div class="hero-goal-name">💪 근력</div>
            <div class="hero-goal-value">
              <span id="heroStrengthCount">0</span>
              <small> / <span id="heroStrengthGoal">0</span>회</small>
            </div>
          </div>
        </div>

        <div class="hero-sub" id="heroSub">아직 기록이 없습니다.</div>
      </div>
    </section>

    <section id="add" class="page">
      <div class="type-switch">
        <button class="active run" data-type="run">🏃 러닝</button>
        <button class="strength" data-type="strength">💪 근력</button>
      </div>

      <form id="runForm" class="card form-card">
        <div class="field">
          <label>날짜</label>
          <input type="date" id="runDate" required />
        </div>
        <div class="field">
          <label>러닝 종류</label>
          <select id="runType">
            <option>이지런</option>
            <option>회복런</option>
            <option>인터벌</option>
            <option>템포런</option>
            <option>LSD</option>
            <option>언덕런</option>
            <option>대회</option>
          </select>
        </div>
        <div class="two-col">
          <div class="field">
            <label>거리 (km)</label>
            <input type="number" id="distance" min="0.1" step="0.1" placeholder="예: 10" required />
          </div>
          <div class="field">
            <label>평균 심박</label>
            <input type="number" id="heartRate" min="40" max="240" placeholder="예: 145" />
          </div>
        </div>
        <div class="field">
          <label>평균 페이스</label>
          <input type="text" id="pace" inputmode="decimal" placeholder="예: 6:02" required />
        </div>
        <div class="field">
          <label>메모 (선택)</label>
          <textarea id="runNote" placeholder="컨디션, 날씨, 코스 등을 기록하세요."></textarea>
        </div>
        <button class="primary" type="submit">러닝 저장</button>
      </form>

      <form id="strengthForm" class="card form-card" style="display:none">
        <div class="field">
          <label>날짜</label>
          <input type="date" id="strengthDate" required />
        </div>
        <div class="field">
          <label>운동 종류</label>
          <select id="exercise">
            <option>케틀벨 스윙</option>
            <option>데드리프트</option>
            <option>고블릿 스쿼트</option>
            <option>더블 프런트 스쿼트</option>
            <option>런지</option>
            <option>오버헤드 프레스</option>
            <option>푸시업</option>
            <option>AB 슬라이더</option>
          </select>
        </div>
        <div class="two-col">
          <div class="field">
            <label>무게 (kg)</label>
            <input type="number" id="weight" min="0" step="0.5" placeholder="예: 32" />
          </div>
          <div class="field">
            <label>횟수</label>
            <input type="number" id="reps" min="1" placeholder="예: 20" required />
          </div>
        </div>
        <div class="field">
          <label>세트</label>
          <input type="number" id="sets" min="1" placeholder="예: 5" required />
        </div>
        <div class="field">
          <label>메모 (선택)</label>
          <textarea id="strengthNote" placeholder="난이도, 자세, 통증 등을 기록하세요."></textarea>
        </div>
        <button class="primary" type="submit">근력 저장</button>
      </form>
    </section>

    <section id="goals" class="page">
      <div class="section-title" style="margin-top:2px">
        <h2>목표 설정</h2>
        <span>자동 저장</span>
      </div>

      <div class="card form-card">
        <div class="field">
          <label>주간 러닝 목표 (km)</label>
          <input type="number" id="weeklyRunGoal" min="0" step="1" placeholder="예: 40" />
        </div>
        <div class="field">
          <label>월간 러닝 목표 (km)</label>
          <input type="number" id="monthlyRunGoal" min="0" step="5" placeholder="예: 160" />
        </div>
        <div class="field">
          <label>주간 근력 목표 (회)</label>
          <input type="number" id="weeklyStrengthGoal" min="0" step="1" placeholder="예: 4" />
        </div>
        <div class="field">
          <label>월간 근력 목표 (회)</label>
          <input type="number" id="monthlyStrengthGoal" min="0" step="1" placeholder="예: 16" />
        </div>
        <button class="primary" id="saveGoals" type="button">목표 저장</button>
      </div>

      <div class="card" style="margin-top:14px">
        <div class="goal-title">추천 시작값</div>
        <div class="goal-grid">
          <div class="goal-mini"><span>주간 러닝</span><strong>40km</strong></div>
          <div class="goal-mini"><span>월간 러닝</span><strong>160km</strong></div>
          <div class="goal-mini"><span>주간 근력</span><strong>4회</strong></div>
          <div class="goal-mini"><span>월간 근력</span><strong>16회</strong></div>
        </div>
      </div>
    </section>

    <section id="history" class="page">
      <div class="section-title" style="margin-top:2px">
        <h2>전체 기록</h2>
        <span id="historyCount">0개</span>
      </div>
      <div id="historyList"></div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="dashboard"><span class="nav-icon">◫</span><span>요약</span></button>
    <button class="nav-btn" data-page="add"><span class="nav-icon">＋</span><span>추가</span></button>
    <button class="nav-btn" data-page="goals"><span class="nav-icon">◎</span><span>목표</span></button>
    <button class="nav-btn" data-page="history"><span class="nav-icon">☰</span><span>기록</span></button>
  </nav>

  <div class="toast" id="toast">저장되었습니다.</div>

<script>
const STORAGE_KEY = "trainingLogPrototypeV1";
const GOAL_KEY = "trainingLogGoalsV1";
const DEFAULT_GOALS = {weeklyRun:40,monthlyRun:160,weeklyStrength:4,monthlyStrength:16};

function readStorage(key, fallback){
  try{
    const value = localStorage.getItem(key);
    if(!value) return fallback;
    const parsed = JSON.parse(value);
    return parsed ?? fallback;
  }catch(error){
    console.warn(`저장 데이터 복구: ${key}`, error);
    localStorage.removeItem(key);
    return fallback;
  }
}

let records = readStorage(STORAGE_KEY, []);
if(!Array.isArray(records)) records = [];
let goals = {...DEFAULT_GOALS, ...readStorage(GOAL_KEY, DEFAULT_GOALS)};
let selectedPeriod = "week";

const $ = (id) => document.getElementById(id);
const today = new Date();
const todayISO = new Date(today.getTime() - today.getTimezoneOffset()*60000).toISOString().slice(0,10);
$("runDate").value = todayISO;
$("strengthDate").value = todayISO;
$("todayLabel").textContent = new Intl.DateTimeFormat("ko-KR",{month:"short",day:"numeric"}).format(today);

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}
function showToast(message){
  const toast = $("toast");
  toast.textContent = message;
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"),1600);
}
function paceToSec(p){
  if(!p || !p.includes(":")) return null;
  const [m,s] = p.split(":").map(Number);
  if(Number.isNaN(m)||Number.isNaN(s)||s<0||s>59) return null;
  return m*60+s;
}
function secToPace(sec){
  if(!sec && sec!==0) return "-";
  const m = Math.floor(sec/60);
  const s = Math.round(sec%60).toString().padStart(2,"0");
  return `${m}:${s}`;
}
function dateRange(period){
  const now = new Date();
  const end = new Date(now.getFullYear(),now.getMonth(),now.getDate(),23,59,59);
  let start;
  if(period==="week"){
    const day = now.getDay();
    const diff = day===0 ? 6 : day-1;
    start = new Date(now.getFullYear(),now.getMonth(),now.getDate()-diff);
  }else{
    start = new Date(now.getFullYear(),now.getMonth(),1);
  }
  return {start,end};
}
function filteredRecords(period){
  const {start,end}=dateRange(period);
  return records.filter(r=>{
    const d = new Date(r.date+"T12:00:00");
    return d>=start && d<=end;
  });
}
function renderGoalProgress(distance, strengthCount){
  const runGoal = selectedPeriod==="week" ? Number(goals.weeklyRun||0) : Number(goals.monthlyRun||0);
  const strengthGoal = selectedPeriod==="week" ? Number(goals.weeklyStrength||0) : Number(goals.monthlyStrength||0);
  const runPct = runGoal > 0 ? Math.min(100,(distance/runGoal)*100) : 0;
  const strengthPct = strengthGoal > 0 ? Math.min(100,(strengthCount/strengthGoal)*100) : 0;
  const available = [runGoal > 0 ? runPct : null, strengthGoal > 0 ? strengthPct : null].filter(v => v !== null);
  const totalPct = available.length ? Math.round(available.reduce((a,b)=>a+b,0)/available.length) : 0;

  $("heroRunGoal").textContent = runGoal || 0;
  $("heroStrengthGoal").textContent = strengthGoal || 0;
  $("heroGoalPercent").textContent = totalPct;
  $("heroGoalBar").style.width = `${Math.min(100,totalPct)}%`;
}
function renderGoalInputs(){
  $("weeklyRunGoal").value = goals.weeklyRun ?? "";
  $("monthlyRunGoal").value = goals.monthlyRun ?? "";
  $("weeklyStrengthGoal").value = goals.weeklyStrength ?? "";
  $("monthlyStrengthGoal").value = goals.monthlyStrength ?? "";
}
function renderDashboard(){
  const data = filteredRecords(selectedPeriod);
  const runs = data.filter(r=>r.category==="run");
  const strengths = data.filter(r=>r.category==="strength");
  const distance = runs.reduce((a,r)=>a+Number(r.distance||0),0);

  $("runDistance").textContent = distance.toFixed(1);
  $("heroStrengthCount").textContent = strengths.length;
  $("heroLabel").textContent = selectedPeriod==="week" ? "이번 주 운동" : "이번 달 운동";
  $("heroSub").textContent = data.length ? "목표를 향해 꾸준히 진행 중입니다." : "아직 기록이 없습니다.";
  renderGoalProgress(distance, strengths.length);
}
function renderHistory(){
  const list=$("historyList");
  list.innerHTML="";
  const sorted=[...records].sort((a,b)=>new Date(b.date)-new Date(a.date)||b.id-a.id);
  $("historyCount").textContent=`${sorted.length}개`;
  if(!sorted.length){
    list.innerHTML=`<div class="card empty"><strong>기록이 없습니다</strong>운동을 추가하면 여기에 표시됩니다.</div>`;
    return;
  }
  sorted.forEach(r=>{
    const card=document.createElement("div");
    card.className="card history-card";
    if(r.category==="run"){
      card.innerHTML=`
        <div class="history-icon icon run">🏃</div>
        <div class="history-content">
          <div class="history-title">${r.runType}</div>
          <div class="history-meta">${formatDate(r.date)} · ${Number(r.distance).toFixed(1)}km · ${r.pace}/km${r.heartRate?` · ${r.heartRate}bpm`:""}</div>
          ${r.note?`<div class="history-note">${escapeHTML(r.note)}</div>`:""}
        </div>
        <button class="delete" aria-label="삭제">×</button>`;
    }else{
      const volume = Number(r.weight||0)*Number(r.reps||0)*Number(r.sets||0);
      card.innerHTML=`
        <div class="history-icon icon strength">💪</div>
        <div class="history-content">
          <div class="history-title">${r.exercise}</div>
          <div class="history-meta">${formatDate(r.date)} · ${r.weight||0}kg · ${r.reps}회 × ${r.sets}세트${volume?` · 볼륨 ${volume.toLocaleString()}kg`:""}</div>
          ${r.note?`<div class="history-note">${escapeHTML(r.note)}</div>`:""}
        </div>
        <button class="delete" aria-label="삭제">×</button>`;
    }
    card.querySelector(".delete").addEventListener("click",()=>{
      records=records.filter(x=>x.id!==r.id);
      save(); renderAll(); showToast("삭제했습니다.");
    });
    list.appendChild(card);
  });
}
function escapeHTML(str){
  return String(str).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]));
}
function renderAll(){renderDashboard();renderHistory();renderGoalInputs()}

document.querySelectorAll(".period-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".period-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    selectedPeriod=btn.dataset.period;
    renderDashboard();
  });
});
document.querySelectorAll(".type-switch button").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".type-switch button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const isRun=btn.dataset.type==="run";
    $("runForm").style.display=isRun?"block":"none";
    $("strengthForm").style.display=isRun?"none":"block";
  });
});
document.querySelectorAll(".nav-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    $(btn.dataset.page).classList.add("active");
    window.scrollTo({top:0,behavior:"smooth"});
  });
});

$("runForm").addEventListener("submit",(e)=>{
  e.preventDefault();
  const pace=$("pace").value.trim();
  if(paceToSec(pace)===null){showToast("페이스는 6:02 형식으로 입력하세요.");return;}
  records.push({
    id:Date.now(), category:"run", date:$("runDate").value,
    runType:$("runType").value, distance:Number($("distance").value),
    pace, heartRate:$("heartRate").value?Number($("heartRate").value):null,
    note:$("runNote").value.trim()
  });
  save(); e.target.reset(); $("runDate").value=todayISO; renderAll(); showToast("러닝을 저장했습니다.");
});
$("strengthForm").addEventListener("submit",(e)=>{
  e.preventDefault();
  records.push({
    id:Date.now(), category:"strength", date:$("strengthDate").value,
    exercise:$("exercise").value, weight:$("weight").value?Number($("weight").value):0,
    reps:Number($("reps").value), sets:Number($("sets").value),
    note:$("strengthNote").value.trim()
  });
  save(); e.target.reset(); $("strengthDate").value=todayISO; renderAll(); showToast("근력 운동을 저장했습니다.");
});

$("saveGoals").addEventListener("click",()=>{
  goals = {
    weeklyRun:Number($("weeklyRunGoal").value)||0,
    monthlyRun:Number($("monthlyRunGoal").value)||0,
    weeklyStrength:Number($("weeklyStrengthGoal").value)||0,
    monthlyStrength:Number($("monthlyStrengthGoal").value)||0
  };
  localStorage.setItem(GOAL_KEY, JSON.stringify(goals));
  renderAll();
  showToast("목표를 저장했습니다.");
});

renderAll();
</script>
</body>
</html>
